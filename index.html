<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mind Reader AI</title>

<style>
body {
    margin: 0;
    background: black;
    color: #00ffff;
    font-family: Arial;
    text-align: center;
}

/* Neon Glow */
.glow {
    text-shadow: 0 0 5px #00ffff, 0 0 20px #00ffff, 0 0 40px #00ffff;
}

/* Title animation */
h1 {
    animation: flicker 1.5s infinite alternate;
}

@keyframes flicker {
    0% { opacity: 1; }
    100% { opacity: 0.7; }
}

/* Button */
button {
    padding: 15px 30px;
    font-size: 18px;
    border: 2px solid #00ffff;
    background: black;
    color: #00ffff;
    cursor: pointer;
    margin-top: 20px;
}

button:hover {
    background: #00ffff;
    color: black;
}

/* Loader */
#loader {
    display: none;
    margin-top: 50px;
}

/* Progress bar */
.progress {
    width: 80%;
    height: 20px;
    border: 2px solid #00ffff;
    margin: auto;
}

.progress-bar {
    height: 100%;
    width: 0%;
    background: #00ffff;
}

/* Fake AI text animation */
#thinkingText {
    margin-top: 20px;
    font-size: 18px;
    animation: blink 1s infinite;
}

@keyframes blink {
    50% { opacity: 0.3; }
}

/* Result */
#result {
    display: none;
    margin-top: 40px;
    font-size: 24px;
}
</style>
</head>

<body>

<h1 class="glow">🧠 Mind Reader AI</h1>
<p>Think of a number between 1 to 10</p>

<button onclick="startReading()">Start Mind Reading</button>

<div id="loader">
    <p class="glow">AI is analyzing brain waves...</p>
    
    <div class="progress">
        <div class="progress-bar" id="bar"></div>
    </div>

    <p id="percent">0%</p>
    <p id="thinkingText">Scanning thoughts...</p>
</div>

<div id="result">
    <h2 class="glow" id="finalResult"></h2>
    <button onclick="location.reload()">Try Again</button>
</div>

<!-- Sound -->
<audio id="beep" src="https://www.soundjay.com/button/beep-07.wav"></audio>

<script>

function startReading() {
    document.querySelector("button").style.display = "none";
    document.getElementById("loader").style.display = "block";

    let progress = 0;
    let bar = document.getElementById("bar");
    let percentText = document.getElementById("percent");
    let thinkingText = document.getElementById("thinkingText");
    let beep = document.getElementById("beep");

    let messages = [
        "Scanning thoughts...",
        "Accessing brain waves...",
        "Analyzing patterns...",
        "Decrypting memory...",
        "Almost there..."
    ];

    let interval = setInterval(() => {
        progress += Math.floor(Math.random() * 8) + 3;

        if (progress >= 100) {
            progress = 100;
            clearInterval(interval);
            setTimeout(showResult, 1000);
        }

        bar.style.width = progress + "%";
        percentText.innerText = progress + "%";

        // Change fake AI messages
        thinkingText.innerText = messages[Math.floor(Math.random() * messages.length)];

        // Play sound
        beep.currentTime = 0;
        beep.play();

    }, 400);
}

function showResult() {
    document.getElementById("loader").style.display = "none";
    document.getElementById("result").style.display = "block";

    // Fake intelligent guess (illusion)
    let numbers = [3, 7, 5, 9, 2];
    let number = numbers[Math.floor(Math.random() * numbers.length)];

    document.getElementById("finalResult").innerText =
        "I read your mind... Your number is: " + number;
}

</script>

</body>
</html>
